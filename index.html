<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Clínica Esperança | Saúde e Medicina Premium em Natal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- PALETA CONSULTÓRIO PREMIUM (CLÁSSICO) --- */
        :root {
            --bg-claro: #F8FAFC;
            --bg-card: #FFFFFF;
            --azul-marinho: #0A192F; /* Azul profundo corporativo */
            --azul-medico: #1B365D; /* Azul marinho secundário */
            --dourado-premium: #C5A059; /* Dourado refinado */
            --dourado-hover: #A3803B;
            --texto-escuro: #1E293B;
            --texto-suave: #64748B;
            --borda: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg-claro);
            color: var(--texto-escuro);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 700; color: var(--azul-marinho); }
        a { text-decoration: none; color: inherit; }

        .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--borda); padding: 20px 0;
            box-shadow: 0 2px 15px rgba(10, 25, 47, 0.03);
        }
        header .wrap { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }
        .logo span { color: var(--dourado-premium); }
        
        .btn-header {
            background: transparent; color: var(--azul-marinho); border: 2px solid var(--azul-marinho);
            padding: 10px 24px; border-radius: 4px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-header:hover { background: var(--azul-marinho); color: white; }

        /* HERO INTERFACE */
        .hero { padding: 180px 0 90px; background: linear-gradient(180deg, #FFFFFF 0%, var(--bg-claro) 100%); }
        .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: center; }
        .eyebrow { color: var(--dourado-premium); font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 16px; text-transform: uppercase; }
        .hero h1 { font-size: clamp(2.2rem, 4.5vw, 3.2rem); line-height: 1.2; margin-bottom: 24px; }
        .hero h1 span { color: var(--dourado-premium); font-weight: 500; }
        .hero p { color: var(--texto-suave); font-size: 1.05rem; margin-bottom: 36px; max-width: 520px; }
        
        .btn-principal {
            background: var(--dourado-premium); color: white; padding: 16px 36px;
            border-radius: 4px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px;
            transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
        }
        .btn-principal:hover { background: var(--dourado-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(197, 160, 89, 0.3); }

            background: transparent; color: var(--azul-marinho); border: 1px solid var(--azul-marinho); padding: 15px 28px;
